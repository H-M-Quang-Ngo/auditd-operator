name: Build and Release Charm

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Charm
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: canonical/craft-actions/charmcraft/setup@main
        with:
          channel: "3.x/stable"

      - name: Pack the charm
        run: |
          charmcraft -v pack

      - name: Append the charm names with version tag
        run: |
          for f in *.charm; do
            base="${f%.charm}"
            mv "$f" "${base}-${{ github.ref_name }}.charm"
          done

      - name: Output the names of the built charms
        run: |
          for f in *.charm; do echo "::notice::Successfully built $f"; done

      - name: Upload the built charms
        uses: actions/upload-artifact@v7
        with:
          name: charm-artifacts
          path: "*.charm"

  release-and-upload:
    name: Create GitHub Release and Upload Charm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download built charms
        uses: actions/download-artifact@v8
        with:
          name: charm-artifacts
          path: ./artifacts

      - name: Create Release and Upload Charms
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Charm Deployment ${{ github.ref_name }}

            Charm artifacts for Ubuntu 22.04 (Jammy) and 24.04 (Noble) are attached below.
            **Example:**
            ```bash
            # For Ubuntu 22.04
            curl -L "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/auditd_ubuntu%4022.04-amd64-${{ github.ref_name }}.charm" -o auditd.charm

            # For Ubuntu 24.04
            curl -L "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/auditd_ubuntu%4024.04-amd64-${{ github.ref_name }}.charm" -o auditd.charm

            # Deploy the charm
            juju deploy ./auditd.charm
            ```
          files: artifacts/*.charm
          token: ${{ secrets.GITHUB_TOKEN }}
