name: auditd
type: charm
summary: A Juju charm that deploys and manages Linux audit daemon.
description: |
  A Juju charm that deploys and manages auditd on the machine. auditd is the  userspace component
  to the Linux Auditing System. It's responsible for writing audit records to the disk.

  auditd runs on bare-metal or virtual machines only. On LXC containers the charm runs in
  session-recording-only mode (tlog), skipping auditd; if session recording is also disabled
  there the unit blocks, as it has nothing to manage.

platforms:
  ubuntu@22.04:amd64:
  ubuntu@24.04:amd64:

subordinate: true

parts:
  charm:
    source: .
    plugin: uv
    build-snaps: [astral-uv]
    uv-groups:
    - charmlibs

config:
  options:
    num_logs:
      type: int
      default: 10
      description: |
        The number of auditd log files to retains. If the number is < 2, logs are not rotated. This
        number must be 999 or less.
    max_log_file:
      type: int
      default: 512
      description: |
        The maximum file size in megabytes. When this limit is reached, it will trigger a
        'ROTATE' action to rotate the log file.
    enable_session_recording:
      type: boolean
      default: true
      description: |
        A toggle for tlog SSH session recording. When true (default), every inbound SSH
        login to this unit is recorded on a best-effort basis via a global sshd ForceCommand.
        Set to false will disable recording entirely. On LXC containers this is the only
        managed function (auditd is unavailable), so setting it false there blocks the unit;
        container recording has no auditd tamper detection.
    session_recording_exclude_groups:
      type: string
      default: ""
      description: |
        Comma-separated list of Unix group names to exclude from session recording. Empty
        (default) means record everyone. Members of any listed group are dropped into their
        real shell unrecorded. Group membership is matched on primary or supplementary groups.
        Only takes effect when enable_session_recording is true.

provides:
  cos-agent:
    interface: cos_agent
    limit: 1

requires:
  general-info:
    interface: juju-info
    scope: container
