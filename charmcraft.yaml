name: auditd
type: charm
summary: A Juju charm that deploys and manages Linux audit daemon.
description: |
  A Juju charm that deploys and manages auditd on the machine. auditd is the  userspace component
  to the Linux Auditing System. It's responsible for writing audit records to the disk.

platforms:
  ubuntu@22.04:amd64:
  ubuntu@24.04:amd64:

subordinate: true

parts:
  charm:
    source: .
    plugin: uv
    build-snaps: [astral-uv]
    uv-groups:
    - charmlibs

config:
  options:
    num_logs:
      type: int
      default: 10
      description: |
        The number of auditd log files to retains. If the number is < 2, logs are not rotated. This
        number must be 999 or less.
    max_log_file:
      type: int
      default: 512
      description: |
        The maximum file size in megabytes. When this limit is reached, it will trigger a
        'ROTATE' action to rotate the log file.
    session_recording_groups:
      type: string
      default: ""
      description: |
        Comma-separated list of Unix group names whose SSH sessions will be recorded by tlog.
        Members of these groups are matched via sshd Match Group (OR-semantics: primary or
        supplementary group membership). Set to empty (default) disables recording.

        Groups in this list match any user whose *primary or supplementary* group is listed
        - including groups like 'sudo' or 'adm' which cover far more users than intended.
        Block on system groups (root, sudo, adm, users, nogroup, daemon).

provides:
  cos-agent:
    interface: cos_agent
    limit: 1

requires:
  general-info:
    interface: juju-info
    scope: container
