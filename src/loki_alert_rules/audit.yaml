groups:
- name: linux_audit.rules
  rules:
  - alert: LinuxUserAuthFailed
    expr: |
      count by (instance, juju_model, juju_model_uuid) (
        rate({filename=~"/var/log/audit/audit\\.log.*"}
        | logfmt
        | type = "USER_AUTH"
        | res =~ ".*failed.*" [1h])
      ) / (
        count by (instance, juju_model, juju_model_uuid) (
            rate({filename=~"/var/log/audit/audit\\.log.*"}
            | logfmt
            | type = "USER_AUTH"
            | res =~ "(.*failed.*|.*success.*)" [1h])
        )
      ) * 100 > 20
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Too many user authentication failed in the past 1 hour
      description: |
        The user authentication failure rate on {{ $labels.instance }} is > 20% in the past 1 hour, and the situation lasted for 5 minutes.

          LABELS = {{ $labels }}
  - alert: LinuxUserLoginFailed
    expr: |
      count by (instance, juju_model, juju_model_uuid) (
        rate({filename=~"/var/log/audit/audit\\.log.*"}
        | logfmt
        | type = "USER_LOGIN"
        | res =~ ".*failed.*" [1h])
      ) / (
        count by (instance, juju_model, juju_model_uuid) (
            rate({filename=~"/var/log/audit/audit\\.log.*"}
            | logfmt
            | type = "USER_LOGIN"
            | res =~ "(.*failed.*|.*success.*)" [1h])
        )
      ) * 100 > 20
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Too many user login failed in the past 1 hour
      description: |
        The user login failure rate on {{ $labels.instance }} is > 20% in the past 1 hour, and the situation lasted for 5 minutes.

          LABELS = {{ $labels }}
  - alert: LinuxUserAccountChanged
    expr: |
      count by (instance, name, nametype, juju_model, juju_model_uuid) (
        rate({filename=~"/var/log/audit/audit\\.log.*"}
        | logfmt
        | type = "PATH"
        | name =~ "(^/etc/passwd$|^/etc/shadow$|^/etc/sudoers$|^/etc/sudoers.d/$)"
        | nametype =~ "(CREATE|DELETE)" [3d])
      ) > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Linux user account had been changed in the past 3 days
      description: |
        The linux user account had been changed on {{ $labels.instance }} in the past 3 days. The file '{{ $labels.name }}' was {{ $labels.nametype }}D. Operators are suggested to check the relevant logs to find out what was changed.

          LABELS = {{ $labels }}
  - alert: RecordingAssetTampered
    expr: |
      count by (instance, tkey, juju_model, juju_model_uuid) (
        count_over_time({filename=~"/var/log/audit/audit\\.log.*"}
        |~ `type=SYSCALL`
        |~ `(tlog_recording_tamper|tlog_config_tamper|sshd_dropin_tamper|tlog_wrapper_tamper|tlog_recorder_tamper|tlog_logrotate_tamper|sshd_main_config_tamper)`
        | regexp `auid=(?P<auid>[0-9]+)`
        | regexp `key=.(?P<tkey>[a-z_]+)`
        | auid != `4294967295` [1h])
      ) > 0
    labels:
      severity: critical
    annotations:
      summary: tlog recording asset tampered on {{ $labels.instance }}
      description: |
        An auditd watch fired for key '{{ $labels.tkey }}' on {{ $labels.instance }} from an
        interactive session. This indicates a write or attribute change on a session
        recording asset - the recording file, rotated recordings, tlog/sshd config, the sshd
        drop-in, the tlog wrapper, the setuid recorder binary, or the logrotate config. Recordings
        may have been altered or disabled.
        Check the event with "sudo ausearch -k {{ $labels.tkey }}".

          LABELS = {{ $labels }}
  - alert: AuditRulesTampered
    expr: |
      count by (instance, juju_model, juju_model_uuid) (
        count_over_time({filename=~"/var/log/audit/audit\\.log.*"}
        |~ `type=SYSCALL`
        |~ `audit_rules_tamper`
        | regexp `auid=(?P<auid>[0-9]+)`
        | auid != `4294967295` [1h])
      ) > 0
    labels:
      severity: critical
    annotations:
      summary: auditd rules tampered on {{ $labels.instance }}
      description: |
        An auditd watch fired for key 'audit_rules_tamper' on {{ $labels.instance }} from an
        interactive session - a write or attribute change under /etc/audit/rules.d/.
        Tampering the audit rules can blind every other tamper alert.
        Check the event with "sudo ausearch -k audit_rules_tamper".

          LABELS = {{ $labels }}
  - alert: SshdLaunchedFromSession
    expr: |
      count by (instance, juju_model, juju_model_uuid) (
        count_over_time({filename=~"/var/log/audit/audit\\.log.*"}
        |~ `type=SYSCALL`
        |~ `sshd_execve` [1h])
      ) > 0
    labels:
      severity: warning
    annotations:
      summary: sshd launched from a login session on {{ $labels.instance }}
      description: |
        sshd was executed from an interactive login session on {{ $labels.instance }}.
        A second sshd instance launched from a session could bypass session recording.
        Check the event with "sudo ausearch -k sshd_execve".

          LABELS = {{ $labels }}
  - alert: FileTransferSessionDetected
    expr: |
      count by (instance, auid, exe, juju_model, juju_model_uuid) (
        count_over_time({filename=~"/var/log/audit/audit\\.log.*"}
        |~ `type=SYSCALL`
        |~ `file_transfer`
        | regexp `auid=(?P<auid>[0-9]+)`
        | regexp `exe="(?P<exe>[^"]+)"`
        | auid != `4294967295` [1h])
      ) > 0
    labels:
      severity: warning
    annotations:
      summary: file transfer on {{ $labels.instance }}
      description: |
        A file-transfer session (scp/rsync/sftp) ran on {{ $labels.instance }}:
        login uid {{ $labels.auid }} executed {{ $labels.exe }}. This may be legitimate
        operator activity.
        Check the event with "sudo ausearch -k file_transfer -i --start today".

          LABELS = {{ $labels }}
